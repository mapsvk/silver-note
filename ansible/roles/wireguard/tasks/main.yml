---
# tasks file for roles/srv01
- name: Install prerequisites for WireGuard
  ansible.builtin.apt:
    name: "{{ wg_required_packages }}"
    state: present
    update_cache: true

- name: Install WireGuard
  ansible.builtin.apt:
    name: wireguard
    state: present

- name: Enable IPv4 forwarding in kernel
  ansible.posix.sysctl:
    name: net.ipv4.ip_forward
    value: '1'
    sysctl_set: true
    state: present
    reload: true

- name: Check if WireGuard private key already exists
  ansible.builtin.stat:
    path: "{{ wg_config_dir }}/private.key"
  register: wg_private_key_file

- name: Generate server private key if exists
  ansible.builtin.command: wg genkey
  register: wg_private_key_output_raw
  when: not wg_private_key_file.stat.exists

- name: Get private key form output_raw
  ansible.builtin.set_fact:
    wg_private_key_output: "{{ wg_private_key_output_raw.stdout }}"
  when: not wg_private_key_file.stat.exists

- name: Save generated private key to file
  ansible.builtin.copy:
    content: "{{ wg_private_key_output }}"
    dest: "{{ wg_config_dir }}/private.key"
    owner: root
    group: root
    mode: '0600'
  when: not wg_private_key_file.stat.exists

- name: Read private key if file exists
  ansible.builtin.slurp:
    src: "{{ wg_config_dir }}/private.key"
  register: wg_private_key_base64
  when: wg_private_key_file.stat.exists

- name: Save key to the variable
  ansible.builtin.set_fact:
    wg_private_key_output: "{{ wg_private_key_base64['content'] | b64decode | trim }}"
  when: wg_private_key_file.stat.exists

- name: Generate WireGuard configuration file
  ansible.builtin.template:
    src: wg0.conf.j2
    dest: "{{ wg_config_dir }}/{{ wg_interface }}.conf"
    owner: root
    group: root
    mode: '0600'
  notify: Restart WireGuard

## tasks for wg_manager
- name: Copy WireGuard user creation script from template
  ansible.builtin.template:
    src: wg-add-user.sh.j2
    dest: /usr/local/bin/wg-add-user
    owner: root
    group: root
    mode: '0750'

- name: Copy WireGuard user deletion script from template
  ansible.builtin.template:
    src: wg-del-user.sh.j2
    dest: /usr/local/bin/wg-del-user
    owner: root
    group: root
    mode: '0750'